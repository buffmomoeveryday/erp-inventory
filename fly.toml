app = "erp-inventory"
primary_region = "bom"

[build]

[env]
  PORT = "8080"
  SQLITE_DB_PATH = "/data/db.sqlite3"
  USE_WHITENOISE = "1"
  DEBUG = "False"

[processes]
  app = "gunicorn config.wsgi:application --bind 0.0.0.0:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "sqlite_data"
  destination = "/data"