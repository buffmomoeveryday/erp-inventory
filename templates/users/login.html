{% extends "unauth_base.html" %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
                <div class="text-center mb-4">
                    <a href="/" class="h4 fw-bold text-dark text-decoration-none">Factory<span class="text-primary">Flow</span></a>
                    <p class="text-muted small mb-0 mt-2">Sign in to continue</p>
                </div>
                <div class="card shadow border-0">
                    <div class="card-body p-4 p-md-5">
                        {% if error %}
                        <div class="alert alert-danger small mb-4">{{ error }}</div>
                        {% endif %}
                        <form method="POST" action="">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="email" class="form-label small fw-semibold">Email address</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required autocomplete="username">
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label small fw-semibold">Password</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                    <label class="form-check-label small" for="rememberMe">Remember me</label>
                                </div>
                                <a href="#" class="small text-decoration-none">Forgot password?</a>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Sign in</button>
                            </div>
                        </form>
                        <hr class="my-4">
                        <p class="small text-center text-muted mb-0">
                            Need access? <a href="#" class="text-decoration-none">Contact your admin</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
