services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: "${PORT:-8080}"
      SQLITE_DB_PATH: "${SQLITE_DB_PATH:-/data/db.sqlite3}"
      USE_WHITENOISE: "${USE_WHITENOISE:-1}"
      DEBUG: "${DEBUG:-False}"
      DJANGO_SETTINGS_MODULE: "${DJANGO_SETTINGS_MODULE:-core.settings}"
    expose:
      - "8080"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
